services:
  postgres:
    image: postgres:16-alpine
    container_name: geodash-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5433:5432"   # Postgres — localhost only, port 5433 to avoid conflicts
    environment:
      POSTGRES_USER: geodash
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: geodash
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geodash"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  geodash:
    build: .
    container_name: geodash-app
    restart: unless-stopped
    ports:
      - "8083:8765"   # Dashboard at http://localhost:8083
    environment:
      DATABASE_URL: postgresql://geodash:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/geodash
      POLL_INTERVAL: ${POLL_INTERVAL:-3}
      PYTHONUNBUFFERED: "1"
    volumes:
      - geodash-samples:/app/data/format-samples  # Daily Oref format captures
      - geodash-settings:/app/data/user-settings   # Persistent user settings
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  pgdata:
  geodash-samples:
  geodash-settings:
