services:
  influxdb:
    image: influxdb:2
    container_name: geodash-influxdb
    restart: unless-stopped
    ports:
      - "127.0.0.1:${INFLUXDB_PORT:-8086}:8086"   # InfluxDB UI — localhost only
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_ADMIN_USER:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_ADMIN_PASSWORD:-geodash-admin-pw}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUX_ORG:-geodash}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUX_BUCKET:-redalerts}
      DOCKER_INFLUXDB_INIT_RETENTION: 0  # keep forever
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_TOKEN:-geodash-dev-token}
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  geodash:
    build: .
    container_name: geodash-app
    restart: unless-stopped
    ports:
      - "${GEODASH_PORT:-8083}:8765"   # Dashboard at http://localhost:8083
    environment:
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: ${INFLUX_TOKEN:-geodash-dev-token}
      INFLUX_ORG: ${INFLUX_ORG:-geodash}
      INFLUX_BUCKET: ${INFLUX_BUCKET:-redalerts}
      POLL_INTERVAL: ${POLL_INTERVAL:-3}
      OREF_PROXY_URL: ${OREF_PROXY_URL:-}
      PYTHONUNBUFFERED: "1"
    volumes:
      - geodash-samples:/app/data/format-samples  # Daily Oref format captures
      - geodash-settings:/app/data/user-settings   # Persistent user settings
    depends_on:
      influxdb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  influxdb-data:
  influxdb-config:
  geodash-samples:
  geodash-settings:
