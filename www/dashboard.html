<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Alert Geodash</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Dashboard Status Bar ────────────────────────────── */
        .dashboard-status-bar {
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 0.95rem;
        }

        #status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #7eddb8;
            animation: pulse 3s infinite;
        }
        #status-indicator.error { background: #e94560; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        #payload-indicator {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #aab;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        #payload-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #444;
            transition: background 0.15s;
        }
        #payload-dot.flash {
            background: #6a9;
            box-shadow: 0 0 3px #6a9;
        }

        #alert-count {
            background: #e94560;
            color: white;
            padding: 3px 12px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 0.9rem;
            display: none;
        }
        #alert-count.active { display: inline-block; }

        .map-lock-btn {
            background: none;
            border: 1px solid #0f3460;
            color: #ccd;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .map-lock-btn:hover { border-color: #7eddb8; }
        .map-lock-btn.unlocked { border-color: #7eddb8; color: #7eddb8; }

        /* Nav tabs handled by components.js */

        /* ── Main Content ────────────────────────────────────── */
        .main-content {
            display: flex;
            flex: 1;
            min-height: 0;
        }

        /* Maps area */
        .maps-area {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 0;
        }

        .maps-grid {
            display: flex;
            flex: 1;
            min-height: 0;
        }

        .map-column {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 0;
        }

        .map-column + .map-column {
            border-left: 2px solid #0f3460;
        }

        .map-card {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            min-height: 0;
        }

        .map-card + .map-card {
            border-top: 2px solid #0f3460;
        }

        .map-label {
            position: absolute;
            top: 12px;
            left: 12px;
            z-index: 1000;
            background: rgba(22, 33, 62, 0.92);
            padding: 6px 16px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            color: #eef;
            pointer-events: none;
        }

        .map-wrap {
            flex: 1;
            min-height: 0;
        }
        .map-wrap > div {
            width: 100%;
            height: 100%;
        }

        /* ── Alert Flash Bar ─────────────────────────────────── */
        .alert-flash-bar {
            background: #16213e;
            border-top: 2px solid #0f3460;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-shrink: 0;
            min-height: 48px;
            overflow: hidden;
            white-space: nowrap;
            transition: background 0.3s, border-color 0.3s;
        }

        .alert-flash-bar.alert-active {
            background: #e94560;
            border-top-color: #ff2244;
            animation: flashbar-red 1s infinite;
        }

        .alert-flash-bar.warning-active {
            background: #ff9800;
            border-top-color: #ffb300;
            animation: flashbar-orange 1.2s infinite;
        }

        .alert-flash-bar.allclear-active {
            background: #1a3a2a;
            border-top-color: #4ecca3;
        }

        .flashbar-label {
            font-size: 0.85rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #7eddb8;
            flex-shrink: 0;
        }

        .alert-flash-bar.alert-active .flashbar-label {
            color: #fff;
            font-size: 1rem;
        }

        .alert-flash-bar.warning-active .flashbar-label {
            color: #fff;
            font-size: 1rem;
        }

        .alert-flash-bar.allclear-active .flashbar-label {
            color: #4ecca3;
        }

        .flashbar-text {
            font-size: 1rem;
            font-weight: 700;
            color: #889;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        .alert-flash-bar.alert-active .flashbar-text {
            color: #fff;
            font-size: 1.1rem;
        }

        .alert-flash-bar.warning-active .flashbar-text {
            color: #fff;
            font-size: 1.1rem;
        }

        .alert-flash-bar.allclear-active .flashbar-text {
            color: #7eddb8;
        }

        .flashbar-count {
            font-size: 0.9rem;
            font-weight: 800;
            color: #fff;
            background: rgba(0,0,0,0.3);
            padding: 3px 12px;
            border-radius: 12px;
            flex-shrink: 0;
            display: none;
            white-space: nowrap;
        }

        .alert-flash-bar.alert-active .flashbar-count,
        .alert-flash-bar.warning-active .flashbar-count {
            display: inline-block;
        }

        @keyframes flashbar-red {
            0%, 100% { background: #e94560; }
            50% { background: #c0243a; }
        }

        @keyframes flashbar-orange {
            0%, 100% { background: #ff9800; }
            50% { background: #e07800; }
        }

        .test-modal-open-btn {
            background: #0f3460;
            border: 1px solid #2a4a80;
            color: #aab;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.2s;
            margin-left: auto;
        }
        .test-modal-open-btn:hover { color: #fff; border-color: #7eddb8; }

        /* ── Test Modal ─────────────────────────────────────── */
        .test-modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 8000;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
        }
        .test-modal.active { display: flex; }
        .test-modal-content {
            background: #16213e;
            border: 2px solid #0f3460;
            border-radius: 12px;
            width: 480px;
            max-width: 90vw;
            max-height: 90vh;
            overflow-y: auto;
        }
        .test-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid #0f3460;
        }
        .test-modal-header h2 {
            color: #7eddb8;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin: 0;
        }
        .test-modal-close {
            background: none;
            border: none;
            color: #889;
            font-size: 1.3rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            transition: color 0.2s;
        }
        .test-modal-close:hover { color: #fff; }
        .test-modal-body { padding: 16px 20px; }
        .test-section { margin-bottom: 16px; }
        .test-section h3 {
            font-size: 0.8rem;
            color: #aab;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        .test-btn-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .test-btn {
            background: #0f3460;
            border: 1px solid #2a4a80;
            color: #dde;
            padding: 10px 18px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
            min-width: 180px;
            text-align: center;
        }
        .test-btn:hover { border-color: #7eddb8; color: #fff; }
        .test-btn-red:hover { background: #e94560; border-color: #e94560; }
        .test-btn-warning:hover { background: #ff9800; border-color: #ff9800; }
        .test-btn-allclear:hover { background: #2a6b55; border-color: #4ecca3; }
        .test-btn-clear:hover { background: #555; border-color: #889; }
        .test-btn-delayed:hover { background: #3a3a8e; border-color: #6a6af0; }
        .test-btn-nuke { border-color: #ff4444; color: #ff8888; }
        .test-btn-nuke:hover { background: #8b0000; border-color: #ff0000; color: #fff; }
        .test-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .test-countdown {
            margin-top: 12px;
            font-size: 0.9rem;
            color: #ff9800;
            font-weight: 700;
            text-align: center;
            min-height: 24px;
        }

        .leaflet-container { background: #e8e8e8; }

        .legend {
            position: absolute;
            bottom: 20px;
            left: 10px;
            z-index: 1000;
            background: rgba(22, 33, 62, 0.92);
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 0.85rem;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 4px 0;
            color: #dde;
        }
        .legend-swatch {
            width: 18px;
            height: 12px;
            border-radius: 2px;
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* ── Sidebar ─────────────────────────────────────────── */
        .sidebar {
            width: 320px;
            min-width: 320px;
            background: #16213e;
            border-left: 2px solid #0f3460;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-section {
            padding: 14px 16px;
            border-bottom: 1px solid #0f3460;
        }

        .sidebar-section h3 {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #7eddb8;
            margin-bottom: 10px;
            font-weight: 700;
        }

        /* Monitoring area selector */
        .area-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .area-selector label {
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            color: #bbc;
            background: #0f3460;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .area-selector label:hover { color: #eee; }
        .area-selector input[type="radio"] { display: none; }
        .area-selector input[type="radio"]:checked + label {
            background: #7eddb8;
            color: #1a1a2e;
        }

        .monitoring-area-name {
            margin-top: 8px;
            font-size: 1.1rem;
            font-weight: 700;
            color: #eef;
            padding: 6px 0;
        }

        .monitoring-status {
            margin-top: 4px;
            font-size: 1.1rem;
            font-weight: 700;
            color: #7eddb8;
        }

        /* motto handled by geodash-footer component */

        /* Alert history feed */
        /* Alert scope toggle */
        .alert-scope-toggle {
            display: flex;
            padding: 6px 16px;
            gap: 4px;
            flex-shrink: 0;
        }

        .alert-scope-toggle .scope-btn {
            flex: 1;
            background: #0f3460;
            color: #aab;
            border: 1px solid #1a3a6e;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.78rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .alert-scope-toggle .scope-btn:hover { color: #eee; }

        .alert-scope-toggle .scope-btn.active {
            background: #7eddb8;
            color: #1a1a2e;
            border-color: #7eddb8;
        }

        .alert-feed {
            flex: 1;
            overflow-y: auto;
            padding: 0 16px 14px;
        }

        .alert-feed-header {
            padding: 14px 16px 8px;
        }

        .alert-feed-header h3 {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #7eddb8;
            font-weight: 700;
        }

        .alert-item {
            padding: 6px 10px;
            margin-bottom: 2px;
            border-radius: 4px;
            background: rgba(15, 52, 96, 0.5);
            font-size: 0.8rem;
            line-height: 1.3;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .alert-item .alert-time {
            color: #dde;
            font-size: 0.78rem;
            font-variant-numeric: tabular-nums;
            flex-shrink: 0;
            min-width: 42px;
        }

        .alert-item .alert-type {
            color: #e94560;
            font-size: 0.72rem;
            font-weight: 700;
            flex-shrink: 0;
            white-space: nowrap;
        }

        .alert-item .alert-area {
            color: #eef;
            font-weight: 600;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .alert-item .alert-region {
            color: #8899aa;
            font-weight: 400;
            font-size: 0.85em;
        }

        .alert-item .alert-extra {
            color: #7eddb8;
            font-weight: 700;
            font-size: 0.85em;
        }

        .alert-item .alert-type.cat-13 { color: #7eddb8; }
        .alert-item .alert-type.cat-14 { color: #ff9800; }

        .alert-feed .no-alerts {
            color: #667;
            font-style: italic;
            padding: 20px 0;
            text-align: center;
        }

        .sidebar-footer {
            padding: 8px 16px;
            border-top: 1px solid #0f3460;
            font-size: 0.7rem;
            color: #556;
            text-align: center;
        }

        /* Scrollbar styling */
        .alert-feed::-webkit-scrollbar { width: 6px; }
        .alert-feed::-webkit-scrollbar-track { background: transparent; }
        .alert-feed::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 3px; }

        /* ── Local alert overlay ─────────────────────────────── */
        #local-alert-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 9999;
            pointer-events: none;
            justify-content: center;
            align-items: center;
        }
        #local-alert-overlay.active-red,
        #local-alert-overlay.active-warning,
        #local-alert-overlay.active-allclear {
            display: flex;
            pointer-events: auto;
        }
        #local-alert-overlay.active-red {
            animation: flash-red 0.5s infinite;
        }
        #local-alert-overlay.active-warning {
            animation: flash-orange 0.8s infinite;
        }
        #local-alert-overlay.active-allclear {
            background: rgba(78, 204, 163, 0.15);
        }
        #local-alert-text {
            font-size: 3rem;
            font-weight: 900;
            text-align: center;
            text-transform: uppercase;
            padding: 30px 60px;
            border-radius: 16px;
            text-shadow: 0 0 20px rgba(0,0,0,0.8);
            letter-spacing: 2px;
        }
        #local-alert-overlay.active-red #local-alert-text {
            color: #fff;
            background: rgba(233, 69, 96, 0.85);
            box-shadow: 0 0 60px rgba(233, 69, 96, 0.6);
        }
        #local-alert-overlay.active-warning #local-alert-text {
            color: #fff;
            background: rgba(255, 152, 0, 0.85);
            box-shadow: 0 0 60px rgba(255, 152, 0, 0.6);
        }
        #local-alert-overlay.active-allclear #local-alert-text {
            color: #fff;
            background: rgba(78, 204, 163, 0.85);
            box-shadow: 0 0 60px rgba(78, 204, 163, 0.6);
        }

        #local-alert-dismiss {
            position: absolute;
            top: 24px;
            right: 32px;
            background: rgba(0,0,0,0.5);
            color: #fff;
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 50%;
            width: 48px;
            height: 48px;
            font-size: 1.5rem;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            z-index: 10000;
        }
        #local-alert-dismiss:hover {
            background: rgba(0,0,0,0.8);
            border-color: #fff;
        }
        #local-alert-overlay.active-red #local-alert-dismiss,
        #local-alert-overlay.active-warning #local-alert-dismiss,
        #local-alert-overlay.active-allclear #local-alert-dismiss {
            display: flex;
        }

        @keyframes flash-red {
            0%, 100% { background: rgba(233, 69, 96, 0.15); }
            50% { background: rgba(233, 69, 96, 0.35); }
        }
        @keyframes flash-orange {
            0%, 100% { background: rgba(255, 152, 0, 0.1); }
            50% { background: rgba(255, 152, 0, 0.25); }
        }

        /* ── Mass Alert Overlay ────────────────────────────── */
        #mass-alert-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 9998;
            background: rgba(180, 30, 30, 0.25);
            justify-content: center;
            align-items: center;
            animation: mass-flash 1.5s infinite;
        }
        #mass-alert-overlay.active {
            display: flex;
        }
        #mass-alert-content {
            background: rgba(180, 30, 30, 0.92);
            padding: 40px 60px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 0 80px rgba(233, 69, 96, 0.6);
        }
        #mass-alert-text {
            font-size: 2.5rem;
            font-weight: 900;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        .mass-alert-sub {
            font-size: 1.2rem;
            color: rgba(255,255,255,0.8);
            margin-top: 12px;
            font-weight: 600;
        }
        #mass-alert-dismiss {
            margin-top: 24px;
            background: rgba(0,0,0,0.4);
            color: #fff;
            border: 2px solid rgba(255,255,255,0.5);
            padding: 10px 30px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        #mass-alert-dismiss:hover {
            background: rgba(0,0,0,0.7);
            border-color: #fff;
        }
        @keyframes mass-flash {
            0%, 100% { background: rgba(180, 30, 30, 0.2); }
            50% { background: rgba(180, 30, 30, 0.4); }
        }
    </style>
</head>
<body>
    <div id="geodash-header"></div>
    <div class="dashboard-status-bar" id="status-bar">
        <span id="alert-count"></span>
        <span id="payload-indicator" title="Flashes when new data received from HFC">HFC <span id="payload-dot"></span></span>
        <div id="status-indicator"></div>
        <button id="map-lock-btn" class="map-lock-btn" title="Maps locked — click to unlock">🔒</button>
    </div>

    <div class="main-content">
        <div class="maps-area">
            <div class="maps-grid">
                <!-- Left: Israel Country View -->
                <div class="map-column">
                    <div class="map-card">
                        <div class="map-label">Israel — Country View</div>
                        <div class="map-wrap"><div id="map-country"></div></div>
                    </div>
                </div>
                <!-- Right: Jerusalem split 50/50 -->
                <div class="map-column">
                    <div class="map-card">
                        <div class="map-label">Jerusalem & Surroundings</div>
                        <div class="map-wrap"><div id="map-jerusalem-wide"></div></div>
                    </div>
                    <div class="map-card">
                        <div class="map-label">Jerusalem — City Detail</div>
                        <div class="map-wrap"><div id="map-jerusalem"></div></div>
                    </div>
                </div>
            </div>
            <!-- Alert flash bar -->
            <div class="alert-flash-bar" id="alert-flash-bar">
                <span class="flashbar-label" id="flashbar-label">LIVE</span>
                <span class="flashbar-text" id="flashbar-text">No active alerts</span>
                <span class="flashbar-count" id="flashbar-count"></span>
                <button class="test-modal-open-btn" id="test-modal-open-btn" title="Open test panel">🧪 Test</button>
            </div>
        </div>

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-section">
                <h3>Monitoring Area</h3>
                <div class="monitoring-area-name" id="monitoring-area-name">Jerusalem — South</div>
                <div class="area-selector" id="area-selector"></div>
                <div class="monitoring-status" id="monitoring-status">All clear</div>
            </div>
            <div class="alert-feed-header">
                <h3>Recent Alerts</h3>
            </div>
            <div class="alert-scope-toggle" id="alert-scope-toggle">
                <button class="scope-btn active" id="scope-all-btn">All Country</button>
                <button class="scope-btn" id="scope-local-btn">My Area</button>
            </div>
            <div class="alert-feed" id="alert-feed">
                <div class="no-alerts">No recent alerts</div>
            </div>
            <div id="geodash-footer"></div>
        </aside>
    </div>

    <!-- Test Modal -->
    <div id="test-modal" class="test-modal">
        <div class="test-modal-content">
            <div class="test-modal-header">
                <h2>Test Alerts</h2>
                <button class="test-modal-close" id="test-modal-close">✕</button>
            </div>
            <div class="test-modal-body">
                <div class="test-section">
                    <h3>Instant Tests</h3>
                    <div class="test-btn-grid">
                        <button class="test-btn test-btn-red" id="test-red-btn">🚀 Red Alert</button>
                        <button class="test-btn test-btn-warning" id="test-warning-btn">⏳ Early Warning</button>
                        <button class="test-btn test-btn-allclear" id="test-allclear-btn">✅ All Clear</button>
                        <button class="test-btn test-btn-clear" id="test-clear-btn">🗑 Clear Tests</button>
                    </div>
                </div>
                <div class="test-section">
                    <h3>Delayed Tests</h3>
                    <div class="test-btn-grid">
